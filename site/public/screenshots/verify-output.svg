<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" role="img" aria-labelledby="verify-title verify-desc" preserveAspectRatio="xMidYMid meet">
  <title id="verify-title">Healthy npm run verify output</title>
  <desc id="verify-desc">Terminal capture of a successful npm run verify in the testing-os repo. The command sequence runs sync-version:check (clean, README block matches package.json version), check-doc-drift (13 of 13 checks passed), test:scripts (24 sync-version tests pass, 14 check-doc-drift tests pass, all green), build (tsc --build composite project, no errors), and the workspace test fan-out covering schemas, verify, ingest, findings, report, portfolio, and dogfood-swarm packages — every package reports passing tests with no failures and no warnings.</desc>

  <defs>
    <style>
      .term-bg { fill: #09090b; }
      .term-frame { fill: #18181b; stroke: #27272a; stroke-width: 1; rx: 8; }
      .term-bar { fill: #27272a; rx: 8 8 0 0; }
      .term-dot-r { fill: #f87171; }
      .term-dot-y { fill: #fbbf24; }
      .term-dot-g { fill: #34d399; }
      .term-title { fill: #d4d4d8; font-family: 'Inter', system-ui, sans-serif; font-size: 11px; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace; font-size: 12px; }
      .text-prompt { fill: #34d399; }
      .text-cmd { fill: #fafafa; }
      .text-ok { fill: #34d399; }
      .text-info { fill: #93c5fd; }
      .text-dim { fill: #a1a1aa; }
      .text-body { fill: #e4e4e7; }
    </style>
  </defs>

  <rect width="880" height="480" class="term-bg" />
  <rect x="20" y="20" width="840" height="440" class="term-frame" />
  <rect x="20" y="20" width="840" height="28" class="term-bar" />
  <circle cx="38" cy="34" r="6" class="term-dot-r" />
  <circle cx="58" cy="34" r="6" class="term-dot-y" />
  <circle cx="78" cy="34" r="6" class="term-dot-g" />
  <text x="440" y="38" text-anchor="middle" class="term-title">testing-os — npm run verify</text>

  <g class="mono">
    <text x="36" y="76"><tspan class="text-prompt">$</tspan> <tspan class="text-cmd">npm run verify</tspan></text>

    <text x="36" y="100" class="text-dim">&gt; testing-os@1.1.1 verify</text>
    <text x="36" y="116" class="text-dim">&gt; npm run sync-version:check &amp;&amp; npm run check-doc-drift &amp;&amp; npm run test:scripts &amp;&amp; npm run build &amp;&amp; npm run test</text>

    <text x="36" y="148" class="text-info">[sync-version]</text><text x="160" y="148" class="text-body"> README version block matches package.json — clean.</text>

    <text x="36" y="172" class="text-info">[check-doc-drift]</text><text x="190" y="172" class="text-ok"> OK — 13 check(s) passed.</text>

    <text x="36" y="196" class="text-dim"># node --test scripts/sync-version.test.mjs scripts/check-doc-drift.test.mjs</text>
    <text x="36" y="216" class="text-ok">  ✓ sync-version: 24 tests passed</text>
    <text x="36" y="232" class="text-ok">  ✓ check-doc-drift: 14 tests passed</text>

    <text x="36" y="260" class="text-dim"># tsc --build (composite refs)</text>
    <text x="36" y="280" class="text-ok">  ✓ packages/schemas → built (8 schemas, 0 errors)</text>

    <text x="36" y="308" class="text-dim"># npm test --workspaces --if-present</text>
    <text x="36" y="328"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/schemas         </tspan> <tspan class="text-dim">vitest</tspan>     <tspan class="text-ok">passed</tspan></text>
    <text x="36" y="346"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/verify          </tspan> <tspan class="text-dim">node --test</tspan> <tspan class="text-ok">passed</tspan></text>
    <text x="36" y="364"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/ingest          </tspan> <tspan class="text-dim">node --test</tspan> <tspan class="text-ok">passed</tspan></text>
    <text x="36" y="382"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/findings        </tspan> <tspan class="text-dim">node --test</tspan> <tspan class="text-ok">passed</tspan></text>
    <text x="36" y="400"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/report          </tspan> <tspan class="text-dim">node --test</tspan> <tspan class="text-ok">passed</tspan></text>
    <text x="36" y="418"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/portfolio       </tspan> <tspan class="text-dim">node --test</tspan> <tspan class="text-ok">passed</tspan></text>
    <text x="36" y="436"><tspan class="text-ok">  ✓</tspan> <tspan class="text-body">@dogfood-lab/dogfood-swarm   </tspan> <tspan class="text-dim">node --test</tspan> <tspan class="text-ok">passed</tspan></text>
  </g>
</svg>
